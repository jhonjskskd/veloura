<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veloura | Explore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #000, #1a1a1a);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .header {
      position: absolute;
      top: 20px;
      text-align: center;
    }

    .header h2 {
      color: gold;
      font-weight: 600;
    }

    .card {
      width: 320px;
      height: 480px;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      position: relative;
      animation: fadeIn 0.5s ease;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 15px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
    }

    .info h3 {
      margin: 0;
      font-size: 18px;
    }

    .info p {
      margin-top: 5px;
      font-size: 14px;
      color: #ccc;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .like {
      background: linear-gradient(135deg, gold, orange);
      color: black;
    }

    .pass {
      background: #444;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="header">
    <h2 id="welcomeText"></h2>
  </div>

  <div class="card">
    <img id="profileImage" src="">
    <div class="info">
      <h3 id="profileName"></h3>
      <p id="profileDetails"></p>
    </div>
  </div>

  <div class="buttons">
    <button class="pass" onclick="nextProfile()">Pass</button>
    <button class="like" onclick="likeProfile()">Like</button>
  </div>

  <!-- CONNECT PROFILES -->
  <script src="js/profiles.js"></script>

  <script>
    // Welcome text
    const userName = localStorage.getItem("userName") || "User";
    document.getElementById("welcomeText").innerText = "Welcome, " + userName;

    // Load profiles
    let profiles = getPersonalizedProfiles();
    let index = 0;

    function showProfile() {
      let p = profiles[index];

      document.getElementById("profileImage").src = p.image;
      document.getElementById("profileName").innerText = p.name + ", " + p.age;

      document.getElementById("profileDetails").innerText =
        p.location + " • " + p.distance + "km away" +
        (p.online ? " • Online" : "");
    }

    function nextProfile() {
      index++;
      if (index >= profiles.length) index = 0;
      showProfile();
    }

    function likeProfile() {
      let current = profiles[index];

      alert("You liked " + current.name);

      // Simulate match
      if (Math.random() > 0.5) {
        setTimeout(() => {
          alert("🎉 You matched with " + current.name);

          const isVip = localStorage.getItem("vip");

          if (isVip === "true") {
            window.location.href = "chat.html";
          } else {
            window.location.href = "vip.html";
          }

        }, 500);
      }

      nextProfile();
    }

    // First load
    showProfile();
  </script>

</body>
</html>
