<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veloura | Premium Dating</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background glow */
    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,215,0,0.2), transparent);
      top: -100px;
      right: -100px;
      filter: blur(100px);
    }

    .container {
      position: relative;
      width: 350px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
      text-align: center;
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: gold;
    }

    p {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      background: rgba(255,255,255,0.15);
      transform: scale(1.02);
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, gold, orange);
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(255,215,0,0.4);
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }

    .loading {
      display: none;
      margin-top: 15px;
      font-size: 13px;
      color: #aaa;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Veloura</h1>
    <p>Meet verified singles near you</p>

    <input type="text" id="name" placeholder="Enter your name">
    <input type="text" id="location" placeholder="Enter your city (e.g. Lagos, Abuja)">

    <button onclick="startApp()">Find Matches</button>

    <div class="loading" id="loadingText">
      Finding matches near you...
    </div>

    <div class="footer">
      Private • Secure • Premium Experience
    </div>
  </div>

  <script>
    function startApp() {
      const name = document.getElementById("name").value.trim();
      const location = document.getElementById("location").value.trim();

      if (!name || !location) {
        alert("Please fill in all details");
        return;
      }

      // Save user data
      localStorage.setItem("userName", name);
      localStorage.setItem("userLocation", location);

      // Initialize VIP
      if (!localStorage.getItem("vip")) {
        localStorage.setItem("vip", "false");
      }

      // Show loading
      document.getElementById("loadingText").style.display = "block";

      // Delay for realism
      setTimeout(() => {
        window.location.href = "explore.html";
      }, 1500);
    }
  </script>

</body>
</html>
