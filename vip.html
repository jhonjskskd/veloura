<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veloura VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #000, #1a1a1a);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }

    h1 {
      color: gold;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      margin: 15px 0;
      color: gold;
    }

    .features {
      text-align: left;
      margin: 20px 0;
    }

    .features div {
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, gold, orange);
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .small {
      margin-top: 10px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Unlock VIP</h1>
    <p>Start chatting with your matches</p>

    <div class="price">₦2000</div>

    <div class="features">
      <div>✔ Chat with matches</div>
      <div>✔ See who likes you</div>
      <div>✔ Verified badge</div>
      <div>✔ Priority visibility</div>
    </div>

    <button onclick="payNow()">Upgrade with OPay</button>

    <div class="small">
      Secure payment • Instant access
    </div>
  </div>

  <script>
    function payNow() {
      // ⚠️ TEMP DEMO (we'll replace with real OPay later)

      alert("Redirecting to payment...");

      setTimeout(() => {
        // simulate successful payment
        localStorage.setItem("vip", "true");

        alert("Payment successful! VIP unlocked");

        window.location.href = "chat.html";
      }, 1500);
    }
  </script>

</body>
</html>
